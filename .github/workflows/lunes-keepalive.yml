name: Lunes Host Daily KeepAlive

on:
  schedule:
    # 每天北京时间下午 4:30 自动执行一次保活打卡
    - cron: '30 8 * * *'
  workflow_dispatch: # 支持手动触发测试

jobs:
  check-and-start:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install seleniumbase requests

      - name: Set up WARP
        uses: fscarmen/warp-on-actions@v1.4
        with:
          mode: client
          stack: dual

      # ====== 核心修复：断开连接 -> 切换模式 -> 重新连接 ======
      - name: Configure WARP Proxy Mode
        run: |
          echo "=== 1. 彻底断开 WARP 全局网卡连接 ==="
          sudo warp-cli --accept-tos disconnect || true
          sleep 3

          echo "=== 2. 切换为局部 SOCKS5 代理模式 (Proxy Mode) ==="
          # 兼容新旧不同版本的 cli 语法
          sudo warp-cli --accept-tos mode proxy || sudo warp-cli --accept-tos set-mode proxy || true

          echo "=== 3. 设定本地代理端口为 40000 ==="
          sudo warp-cli --accept-tos proxy port 40000 || sudo warp-cli --accept-tos set-proxy-port 40000 || true

          echo "=== 4. 重新启动 WARP 连接 ==="
          sudo warp-cli --accept-tos connect || true
          sleep 5

          echo "=== 5. 【网络诊断】测试系统主网卡（不走代理，用于验证断网已恢复） ==="
          # 如果这里返回了普通的 IP 且没有报错，说明虚拟机网络恢复正常
          curl --connect-timeout 5 https://ifconfig.me || echo "❌ 虚拟机全局网络依然断开！"

          echo "=== 6. 【代理诊断】测试 SOCKS5 代理网络是否通畅 ==="
          # 检查 127.0.0.1:40000 代理是否成功代理出站
          curl -I --connect-timeout 5 --socks5-hostname 127.0.0.1:40000 https://cloudflare.com/cdn-cgi/trace || echo "❌ WARP SOCKS5 代理无法使用！"

      - name: Run check script
        env:
          LUNES_SERVER_URL: ${{ secrets.LUNES_SERVER_URL }}
          LUNES_EMAIL: ${{ secrets.LUNES_EMAIL }}
          LUNES_PASSWORD: ${{ secrets.LUNES_PASSWORD }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python lunes_run.py

      - name: Upload Debug Screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lunes-debug-screenshot
          path: lunes_debug_screenshot.png
          if-no-files-found: ignore
